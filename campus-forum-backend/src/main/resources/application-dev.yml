spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/campus_forum
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password: ${REDIS_PASSWORD:}
  mail:
    host: smtp.xxx.edu.cn
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.ssl.enable: true

campus:
  jwt:
    access-secret: ${JWT_ACCESS_SECRET}
    access-expiration: 7200000       # 2 hours (ms)
    refresh-secret: ${JWT_REFRESH_SECRET}
    refresh-expiration: 604800000    # 7 days (ms)
  upload:
    path: ./uploads/
    allowed-types: image/jpeg,image/png,image/gif,image/webp
    max-size: 5242880                # 5MB (bytes)
  email:
    expire: 300                      # verification code expiry (seconds)
  docs:
    enabled: true
  cookie:
    secure: false
